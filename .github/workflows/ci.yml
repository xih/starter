name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: |
          npm install --global corepack@latest
          corepack enable
          corepack prepare pnpm@10.10.0 --activate

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Check formatting
        run: corepack pnpm format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: |
          npm install --global corepack@latest
          corepack enable
          corepack prepare pnpm@10.10.0 --activate

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Run ESLint
        run: corepack pnpm lint

      - name: Run stylelint
        run: corepack pnpm lint:styles

      - name: Run project lint rules
        run: |
          corepack pnpm lint:ast
          corepack pnpm lint:design-system

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: |
          npm install --global corepack@latest
          corepack enable
          corepack prepare pnpm@10.10.0 --activate

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Run typecheck
        run: corepack pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: |
          npm install --global corepack@latest
          corepack enable
          corepack prepare pnpm@10.10.0 --activate

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Run tests
        run: corepack pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: |
          npm install --global corepack@latest
          corepack enable
          corepack prepare pnpm@10.10.0 --activate

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build
        run: corepack pnpm build
